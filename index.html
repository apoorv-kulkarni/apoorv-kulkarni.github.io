<html lang="en">

    <style>
        /* Modern CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Custom Properties for consistency */
        :root {
            --primary-color: #2d3748;
            --text-color: #718096;
            --bg-color: #f8f5f1;
            --card-bg: #fdfcf9;
            --border-color: #e2e8f0;
            --hover-color: #4299e1;
            --font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }

        /* Dark mode support - system preference */
        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) {
                --primary-color: #e2e8f0;
                --text-color: #a0aec0;
                --bg-color: #1a202c;
                --card-bg: #2d3748;
                --border-color: #4a5568;
                --hover-color: #63b3ed;
            }
        }

        /* Manual dark mode override */
        :root[data-theme="dark"] {
            --primary-color: #e2e8f0;
            --text-color: #a0aec0;
            --bg-color: #1a202c;
            --card-bg: #2d3748;
            --border-color: #4a5568;
            --hover-color: #63b3ed;
        }

        body {
            font-family: var(--font-family);
            line-height: 1.6;
            color: var(--primary-color);
            background-color: var(--bg-color);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Container using CSS Grid - EXPANDED */
        .container {
            max-width: 900px; /* Increased from 600px */
            margin: 0 auto;
            padding: 0 1rem;
            flex: 1;
            display: grid;
            place-items: center;
            text-align: center;
        }

        /* Main content area - WIDER */
        .hero-section {
            padding: 3rem 2rem;
            background-color: var(--card-bg);
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            border: 1px solid var(--border-color);
            max-width: 800px; /* Increased from 600px */
            width: 100%;
        }

        .brand-heading {
            font-size: clamp(2.5rem, 5vw, 4rem);
            font-weight: 300;
            margin-bottom: 1rem;
            color: var(--primary-color);
        }

        .lead-text {
            font-size: 1.25rem;
            color: var(--text-color);
            margin-bottom: 0.25rem; /* Reduced spacing */
        }

        .location-text {
            font-size: 1.1rem;
            color: var(--text-color);
            margin-bottom: 0.5rem;
            font-weight: 300; /* Slightly lighter weight */
        }

        .about-text {
            font-size: 1rem;
            color: var(--text-color);
            max-width: 600px;
            margin: 1.25rem auto 0;
            line-height: 1.7;
        }

        /* Social Icons */
        .social-links {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
            margin-top: 1.75rem;
        }

        .social-icon {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            background-color: #000;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-size: 1.5rem;
            transition: all 0.3s ease;
            opacity: 0.8;
        }

        .social-icon:hover,
        .social-icon:focus {
            opacity: 1;
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.3);
            background-color: #333;
        }

        /* Responsive Design */
        @media (max-width: 768px) {
            .container {
                padding: 0 1rem;
            }
            
            .social-links {
                gap: 1rem;
            }
            
            .social-icon {
                width: 50px;
                height: 50px;
                font-size: 1.25rem;
            }
            
            /* Allow normal text behavior on smaller screens */
            .lead-text {
                font-size: 1.1rem;
            }
            
            .location-text {
                font-size: 1rem;
            }
        }

        @media (max-width: 480px) {
            .hero-section {
                padding: 2rem 1rem;
            }
            
            .lead-text {
                font-size: 1rem;
            }
            
        }

        /* Loading animation */
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @media (prefers-reduced-motion: no-preference) {
            .hero-section {
                animation: fadeIn 0.8s ease-out;
            }
        }

        /* Focus styles for accessibility */
        .social-icon:focus {
            outline: 2px solid var(--hover-color);
            outline-offset: 2px;
        }

        /* Theme toggle button */
        .theme-toggle {
            position: fixed;
            top: 1rem;
            right: 1rem;
            background: none;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            color: var(--text-color);
            cursor: pointer;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: border-color 0.2s, color 0.2s;
            padding: 0;
        }

        .theme-toggle:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
        }

        .theme-toggle:focus {
            outline: 2px solid var(--hover-color);
            outline-offset: 2px;
        }

        .theme-toggle .icon-sun { display: none; }
        .theme-toggle .icon-moon { display: block; }

        :root[data-theme="dark"] .theme-toggle .icon-sun { display: block; }
        :root[data-theme="dark"] .theme-toggle .icon-moon { display: none; }

        @media (prefers-color-scheme: dark) {
            :root:not([data-theme="light"]) .theme-toggle .icon-sun { display: block; }
            :root:not([data-theme="light"]) .theme-toggle .icon-moon { display: none; }
        }

        /* Print styles */
        @media print {
            .social-links {
                display: none;
            }
            .theme-toggle {
                display: none;
            }
        }
    </style>
</head>
<body>

            </nav>
        </main>
    </div>

    <script>
        (function () {
            const root = document.documentElement;
            const toggle = document.querySelector('.theme-toggle');
            const stored = localStorage.getItem('theme');
            if (stored) root.setAttribute('data-theme', stored);

            toggle.addEventListener('click', function () {
                const current = root.getAttribute('data-theme');
                const systemDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                let next;
                if (current === 'dark') {
                    next = 'light';
                } else if (current === 'light') {
                    next = 'dark';
                } else {
                    next = systemDark ? 'light' : 'dark';
                }
                root.setAttribute('data-theme', next);
                localStorage.setItem('theme', next);
            });
        })();
    </script>
</body>
